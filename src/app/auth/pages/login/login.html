<div class="login-container d-flex justify-content-center align-items-center vh-100" 
     [style.backgroundImage]="'url(/fondoLogin.jpg)'">

    <div class="header-login">
        <a routerLink="/" class="d-flex align-items-center text-decoration-none">
            <img src="/logo.png" alt="Logo Harmony" width="60" height="60" class="me-2">
            <h1 class="h2 mb-0 text-white">Harmony</h1>
        </a>
    </div>

    <div class="card login-card">
        <div class="card-body p-5">
            <h2 class="card-title text-center mb-4">Iniciar Sesión</h2>

            <form #loginForm="ngForm" (ngSubmit)="iniciarSesion(loginForm)">
                <div class="mb-3">
                    <label for="correo" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="correo" name="email" 
                           placeholder="tu@ejemplo.com" required 
                           [(ngModel)]="loginData.email">
                </div>
                <div class="mb-4">
                    <label for="contrasena" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="contrasena" name="password"
                           placeholder="********" required 
                           [(ngModel)]="loginData.password">
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button type="submit" class="btn btn-primary btn-login" [disabled]="!loginForm.valid">Acceder</button>
                </div>
                <p class="text-center mt-3">
                    <a routerLink="/auth/forgot-password" class="text-decoration-none forgot-password-link">¿Olvidaste tu contraseña?</a>
                </p>
            </form>
        </div>
    </div>
</div>
